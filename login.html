<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | Bobby Bunny Shop!</title>

    <link rel="icon" href="assets/multimedia/pictures/icon-pagina.png">
    <link rel="stylesheet" href="./assets/css/loginUserStyleSheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="./assets/js/loginScripts.js" defer></script>
</head>
<body>

    <header>
        <nav class="barra-nav">
          
            <ul class="nav-ul">
                
                <li><a href=""><i class="fas fa-shopping-bag"></i></a></li>
                <li><a href="">Registrarse</a></li>
                <li><a href="login.html" class="nav-activo">Iniciar sesión</a></li>
            </ul>
        </nav>

        <nav class="barra-nav-sec">
            
        </nav>
    </header>

    <main>
        <div class="login-wrapper">
            <div class="login-card">

                <!-- Imagen del conejo -->
                <div class="login-icono">
                    <img src="assets/multimedia/pictures/icon.png" alt="Bobby Bunny" class="conejo-img"
                         onerror="this.outerHTML='<span class=conejo-fallback>🐰</span>'">
                </div>

                <h1>Bienvenido</h1>
                <p class="subtitulo">Inicia sesión en tu cuenta de Bobby Bunny Shop</p>

                <div class="divisor"><span>✦</span></div>

                <div class="campo">
                    <label for="correo">Correo electrónico</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="correo" placeholder="tu@correo.com" autocomplete="email">
                    </div>
                </div>

                <div class="campo">
                    <label for="contrasena">Contraseña</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="contrasena" placeholder="••••••••" autocomplete="current-password">
                        <button type="button" class="toggle-pass" id="togglePass" aria-label="Mostrar contraseña">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <a href="#" class="olvide">¿Olvidaste tu contraseña?</a>

                <button class="btn-login" id="btnLogin">Iniciar sesión</button>

                <p class="registro-link">
                    ¿No tienes cuenta? <a href="#">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2025 Bobby Bunny Shop · Todo para tu conejo</p>
    </footer>

</body>
</html>
