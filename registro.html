<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse | Bobby Bunny Shop!</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --marron-header:  #3a2f1e;
            --marron-oscuro:  #2e2410;
            --marron-medio:   #5c4a28;
            --marron-acento:  #7a6035;
            --beige-nav:      #c8b89a;
            --beige-fondo:    #d4c4a8;
            --beige-claro:    #e2d5bc;
            --beige-blanco:   #f0e8d8;
            --texto-oscuro:   #2e2410;
            --texto-medio:    #5c4a28;
            --texto-claro:    #8a7a5a;
            --sombra:         0 8px 32px rgba(58, 47, 30, 0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--beige-fondo);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ---- HEADER ---- */
        .barra-nav {
            background-color: var(--marron-header);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 6%;
            gap: 1.5rem;
        }

        .logo-img { height: 46px; }
        .logo-fallback {
            font-size: 1.6rem;
            color: rgba(255,255,255,0.9);
        }

        .barra-busqueda {
            display: flex;
            align-items: center;
            flex-grow: 1;
            max-width: 520px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            margin: 0 1.5rem;
        }
        .barra-busqueda input {
            background: transparent;
            border: none;
            outline: none;
            color: rgba(255,255,255,0.85);
            font-family: 'Quicksand', sans-serif;
            font-size: 0.88rem;
            width: 100%;
            padding: 6px 0;
        }
        .barra-busqueda input::placeholder { color: rgba(255,255,255,0.4); }
        .boton-busqueda {
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 50%;
            width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            color: white;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .boton-busqueda:hover { background: rgba(255,255,255,0.25); }

        .nav-ul { display: flex; align-items: center; list-style: none; gap: 1.2rem; }
        .nav-ul a {
            text-decoration: none;
            color: rgba(255,255,255,0.85);
            font-weight: 600;
            font-size: 0.88rem;
            transition: color 0.2s;
        }
        .nav-ul a:hover { color: #fff; }

        .barra-nav-sec {
            background-color: var(--beige-nav);
            padding: 0.4rem 6%;
        }
        .barra-nav-sec .nav-ul { gap: 2.2rem; flex-wrap: wrap; }
        .barra-nav-sec .nav-ul a {
            color: var(--texto-oscuro);
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            position: relative;
            padding-bottom: 2px;
            transition: color 0.2s;
        }
        .barra-nav-sec .nav-ul a::after {
            content: ''; position: absolute; bottom: 0; left: 0;
            width: 0; height: 1.5px; background: var(--marron-oscuro);
            transition: width 0.25s; border-radius: 2px;
        }
        .barra-nav-sec .nav-ul a:hover::after { width: 100%; }
        .barra-nav-sec .nav-ul a:hover { color: var(--marron-oscuro); }

        /* ---- REGISTRO ---- */
        .reg-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
        }

        .reg-card {
            background: var(--beige-blanco);
            border-radius: 18px;
            box-shadow: var(--sombra);
            padding: 3rem 3.5rem;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(92,74,40,0.2);
            animation: aparecer 0.5s ease both;
        }

        @keyframes aparecer {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .reg-icono {
            text-align: center;
            margin-bottom: 0.8rem;
        }
        .conejo {
            font-size: 3rem;
            display: inline-block;
            animation: flotando 3s ease-in-out infinite;
        }
        @keyframes flotando {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }

        .reg-card h1 {
            font-family: 'Nunito', sans-serif;
            font-size: 1.85rem;
            font-weight: 900;
            color: var(--marron-header);
            text-align: center;
            margin-bottom: 0.3rem;
        }
        .subtitulo {
            text-align: center;
            color: var(--texto-claro);
            font-size: 0.84rem;
            margin-bottom: 2rem;
        }

        .divisor {
            display: flex; align-items: center; gap: 10px; margin-bottom: 1.8rem;
        }
        .divisor::before, .divisor::after {
            content: ''; flex: 1; height: 1px; background: var(--beige-nav);
        }
        .divisor span { color: var(--texto-claro); font-size: 0.8rem; }

        .campo { margin-bottom: 1.3rem; }
        .campo label {
            display: block; font-size: 0.82rem; font-weight: 700;
            color: var(--texto-medio); margin-bottom: 6px;
        }
        .input-wrap { position: relative; display: flex; align-items: center; }
        .input-wrap i {
            position: absolute; left: 13px;
            color: var(--marron-acento); font-size: 0.85rem; pointer-events: none;
        }
        .campo input {
            width: 100%;
            padding: 11px 13px 11px 38px;
            border-radius: 10px;
            border: 1.5px solid var(--beige-nav);
            background: var(--beige-fondo);
            font-family: 'Quicksand', sans-serif;
            font-size: 0.9rem;
            color: var(--texto-oscuro);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .campo input::placeholder { color: var(--texto-claro); }
        .campo input:focus {
            border-color: var(--marron-acento);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(122,96,53,0.12);
        }

        .olvide {
            display: block; text-align: right;
            font-size: 0.79rem; color: var(--marron-acento);
            text-decoration: none; margin-top: -5px; margin-bottom: 1.5rem;
            font-weight: 600; transition: color 0.2s;
        }
        .olvide:hover { color: var(--marron-oscuro); }

        .btn-reg {
            width: 100%; padding: 13px;
            background: var(--marron-header);
            color: rgba(255,255,255,0.92);
            border: none; border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.98rem; font-weight: 800;
            cursor: pointer; letter-spacing: 0.4px;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(58,47,30,0.22);
        }
        .btn-reg:hover {
            background: var(--marron-oscuro);
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(58,47,30,0.28);
        }
        .btn-reg:active { transform: translateY(0); }

        .login-link {
            text-align: center; margin-top: 1.3rem;
            font-size: 0.84rem; color: var(--texto-claro);
        }
        .login-link a {
            color: var(--marron-acento); font-weight: 700;
            text-decoration: none; transition: color 0.2s;
        }
        .login-link a:hover { color: var(--marron-oscuro); }

        footer {
            text-align: center; padding: 1rem;
            font-size: 0.78rem; color: var(--texto-claro);
            border-top: 1px solid var(--beige-nav);
            background: var(--beige-claro);
        }
    </style>
    <script src="assets/js/registro.js"></script>
</head>
<body>

    <header>
        <nav class="barra-nav">
            <a href="index.html">
                <img src="assets/multimedia/pictures/icon.png" alt="Bobby Bunny" class="logo-img"
                     onerror="this.outerHTML='<span class=logo-fallback>🐰</span>'">
            </a>
            <form class="barra-busqueda" action="">
                <input type="search" placeholder="Buscar productos...">
                <button type="submit" class="boton-busqueda"><i class="fas fa-search"></i></button>
            </form>
            <ul class="nav-ul">
                <li><a href="#"><i class="fas fa-shopping-bag"></i></a></li>
                <li><a href="#">Registrarse</a></li>
                <li><a href="login.html"
                    style="background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.22); padding:6px 14px; border-radius:6px;">
                    Iniciar sesión
                </a></li>
            </ul>
        </nav>
        <nav class="barra-nav-sec">
            <ul class="nav-ul">
                <li><a href="piensos.html">Piensos</a></li>
                <li><a href="premios.html">Premios</a></li>
                <li><a href="juguetes.html">Juguetes</a></li>
                <li><a href="habitats.html">Habitats</a></li>
                <li><a href="limpieza.html">Limpieza y cuidado</a></li>
            </ul>
        </nav>
    </header>

    <div class="reg-wrapper">
        <div class="reg-card">
            <div class="reg-icono"><span class="conejo">🐰</span></div>
            <h1>Bienvenido</h1>
            <p class="subtitulo">Registra tu cuenta de Bobby Bunny Shop</p>
            <div class="divisor"><span>✦</span></div>

            <div class="campo">
                <label for="user">Nombre de Usuario</label>
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="text" id="user" placeholder="usuario" required>
                </div>
            </div>

            <div class="campo">
                <label for="correo">Correo electrónico</label>
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="correo" placeholder="tu@correo.com" autocomplete="email" required>
                </div>
            </div>

            <div class="campo">
                <label for="correoconfirm">Confirmar Correo</label>
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="correoconfirm" placeholder="tu@correo.com" autocomplete="email" required onblur="checkEmailMatch()">
                </div>
            </div>

            <div class="campo">
                <label for="contrasena">Contraseña</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="contrasena" placeholder="••••••••" autocomplete="new-password" required>
                </div>
            </div>

            <div class="campo">
                <label for="contrasenaconfirm">Confirmar Contraseña</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="contrasenaconfirm" placeholder="••••••••" autocomplete="new-password" required onkeyup="checkPasswordMatch()">
                </div>
            </div>

            <span id="message"></span>
            <button class="btn-reg">Registrar</button>

            <p class="login-link">
                ¿Ya tienes cuenta? <a href="#">Iniciar Sesion</a>
            </p>
        </div>
    </div>

    <footer>© 2025 Bobby Bunny Shop · Todo para tu conejo</footer>
</body>
</html>
